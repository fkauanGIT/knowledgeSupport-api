spring:
  application:
    name: demo
  config:
    import: "optional:file:./.env[.properties]"
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

jira:
  base-url: ${JIRA_BASE_URL}
  email: ${JIRA_EMAIL}
  api-token: ${JIRA_API_TOKEN}
  jql: ${JIRA_JQL:created >= -30d ORDER BY created DESC}
  # Opcional (AAAA-MM-DD). Quando setado, loga um aviso no boot se faltarem <=30 dias
  # para expirar (ou se já tiver expirado). O Jira não expõe essa data via API para
  # o próprio dono do token, então precisa ser informada manualmente.
  api-token-expires-at: ${JIRA_API_TOKEN_EXPIRES_AT:}

matching:
  # Minimum text-similarity score (0-1) for a Standard to be considered a suggestion.
  threshold: ${MATCHING_THRESHOLD:0.4}
  # Score (0-1) above which a text-score match is labeled LIKELY instead of UNCERTAIN.
  high-confidence-threshold: ${MATCHING_HIGH_CONFIDENCE_THRESHOLD:0.75}

security:
  # Key sent in the X-API-KEY header by any API client.
  api-key: ${API_KEY}

management:
  endpoints:
    web:
      exposure:
        include: info,health
  info:
    git:
      mode: simple

springdoc:
  swagger-ui:
    # Desative em produção: SWAGGER_ENABLED=false
    enabled: ${SWAGGER_ENABLED:true}
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  api-docs:
    # Desative em produção: API_DOCS_ENABLED=false
    enabled: ${API_DOCS_ENABLED:true}
    path: /v3/api-docs
