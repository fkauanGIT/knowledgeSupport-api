spring:
  application:
    name: demo
  config:
    import: "optional:file:./.env[.properties]"
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update

jira:
  base-url: ${JIRA_BASE_URL}
  email: ${JIRA_EMAIL}
  api-token: ${JIRA_API_TOKEN}
  jql: ${JIRA_JQL:created >= -30d ORDER BY created DESC}

matching:
  # Minimum text-similarity score (0-1) for a Standard to be considered a suggestion.
  threshold: ${MATCHING_THRESHOLD:0.4}
  # Score (0-1) above which a text-score match is labeled LIKELY instead of UNCERTAIN.
  high-confidence-threshold: ${MATCHING_HIGH_CONFIDENCE_THRESHOLD:0.75}

security:
  # Key sent in the X-API-KEY header by any API client.
  api-key: ${API_KEY}

management:
  endpoints:
    web:
      exposure:
        include: info,health
  info:
    git:
      mode: full

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  api-docs:
    path: /v3/api-docs
  # In production, disable the public docs by uncommenting:
  # api-docs:
  #   enabled: false
  # swagger-ui:
  #   enabled: false