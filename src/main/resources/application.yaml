spring:
  application:
    name: demo
  config:
    import: "optional:file:./.env[.properties]"
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update

jira:
  base-url: ${JIRA_BASE_URL}
  email: ${JIRA_EMAIL}
  api-token: ${JIRA_API_TOKEN}
  jql: ${JIRA_JQL:created >= -30d ORDER BY created DESC}

matching:
  # Score mínimo (0-1) de similaridade de texto para considerar um Standard como sugestão.
  threshold: ${MATCHING_THRESHOLD:0.4}

security:
  # Chave enviada no header X-API-KEY por qualquer cliente da API.
  api-key: ${API_KEY}

management:
  endpoints:
    web:
      exposure:
        include: info,health
  info:
    git:
      mode: full

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  api-docs:
    path: /v3/api-docs
  # Em produção, desabilite a doc pública descomentando:
  # api-docs:
  #   enabled: false
  # swagger-ui:
  #   enabled: false