<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- outer hexagon: the system's boundary -->
  <polygon points="100,16 172,58 172,142 100,184 28,142 28,58"
           fill="none" stroke="#4F46E5" stroke-width="7" stroke-linejoin="round"/>
  <!-- inner hexagon: the application layer -->
  <polygon points="100,52 141,76 141,124 100,148 59,124 59,76"
           fill="#4F46E5" opacity="0.12"/>
  <polygon points="100,52 141,76 141,124 100,148 59,124 59,76"
           fill="none" stroke="#4F46E5" stroke-width="3" stroke-linejoin="round" opacity="0.55"/>
  <!-- core: the domain -->
  <circle cx="100" cy="100" r="17" fill="#10B981"/>
  <!-- ports: inbound (left) and outbound (right) -->
  <rect x="16" y="86" width="24" height="28" rx="6" fill="#10B981"/>
  <rect x="160" y="86" width="24" height="28" rx="6" fill="#10B981"/>
  <!-- core ↔ ports connections -->
  <line x1="40" y1="100" x2="83" y2="100" stroke="#10B981" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="117" y1="100" x2="160" y2="100" stroke="#10B981" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
</svg>
